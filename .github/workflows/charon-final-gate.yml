# Foundation — charon-final-gate workflow (TEMPLATE)
# ---------------------------------------------------------------------------
# CP3 off-box deterministic slice of the Charon Final Gate. The GATE IS THIS WORKFLOW JOB:
# the job named `charon-final-gate` passes/fails as the required status check (no separately
# posted check-run — that earlier design produced a duplicate same-named check). HONEST SCOPE:
# ≈2 of 9 Final-Gate checks (see adapters/vcs/charon-deterministic-recheck.sh).
#
# THE PO LANDS THIS FILE at .github/workflows/charon-final-gate.yml in the project repo
# (adding a workflow file needs the `workflow` scope, which the bot PATs do NOT have post-CP2).
# The recheck SCRIPT is a regular file the operator lands; it MUST already be on the BASE branch
# before the gate can pass — the job reads it from the trusted base ref and FAILS CLOSED if absent
# (so on the bootstrap PR that first adds the gate, the check is RED until that PR merges — expected).
#
# CORRECTNESS / SECURITY notes:
#  - The required check is the workflow JOB status — one check, no API plumbing, no PIPESTATUS.
#  - The recheck script + its R7 patterns are read from the TRUSTED BASE ref (not the PR head),
#    so a PR cannot neuter its own gate.
#  - PR-controlled inputs (title/body/head.ref/sha/base.ref) pass via `env:`, never interpolated
#    into the shell — no Actions script injection.
#  - `set -euo pipefail` + `script | tee` → pipefail makes the SCRIPT's exit (not tee's) the job's
#    verdict (verified). A non-zero recheck fails the job = a red required check.
#  - Same-repo PRs assumed (fork PRs get a read-only GITHUB_TOKEN).
# ---------------------------------------------------------------------------
name: Charon Final Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, test]   # main = the test->main production-promotion gate; test = feature integration

permissions:
  contents: read
  pull-requests: read

jobs:
  charon-final-gate:          # ← this job name IS the required status check (require it by this name)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head (full history for ancestry/diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base ref (explicit refspec so origin/<base> resolves)
        env:
          BASE_REF_NAME: ${{ github.event.pull_request.base.ref }}
        run: git fetch --no-tags origin "+refs/heads/${BASE_REF_NAME}:refs/remotes/origin/${BASE_REF_NAME}"

      - name: Charon deterministic recheck (from the TRUSTED BASE copy)
        env:
          BASE_REF_NAME: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA:      ${{ github.event.pull_request.head.sha }}
          SRC_BRANCH:    ${{ github.event.pull_request.head.ref }}
          PR_TITLE:      ${{ github.event.pull_request.title }}
          PR_BODY:       ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Integrity: read the recheck script from the TRUSTED BASE ref (not the PR head); fail closed if absent.
          if ! git show "origin/${BASE_REF_NAME}:adapters/vcs/charon-deterministic-recheck.sh" > /tmp/recheck.sh 2>/dev/null || [ ! -s /tmp/recheck.sh ]; then
            echo "::error::charon-final-gate: recheck script absent on base ref '${BASE_REF_NAME}' (first install? wrong path?) — failing closed."
            exit 1
          fi
          chmod +x /tmp/recheck.sh
          # The script's exit code IS the gate verdict → a non-zero fails THIS job (= the required check).
          # pipefail makes the script's exit (not tee's) the pipeline's exit; tee mirrors output to the PR check summary.
          CHARON_BASE_REF="origin/${BASE_REF_NAME}" \
          CHARON_HEAD_SHA="${HEAD_SHA}" \
          CHARON_SRC_BRANCH="${SRC_BRANCH}" \
          CHARON_TARGET_BRANCH="${BASE_REF_NAME}" \
          CHARON_ISSUE_REF="${PR_TITLE} ${PR_BODY}" \
            /tmp/recheck.sh | tee -a "$GITHUB_STEP_SUMMARY"
